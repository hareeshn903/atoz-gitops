{{- if .Values.ingress.enabled }}

apiVersion: networking.k8s.io/v1

kind: Ingress

metadata:
  name: {{ include "mini-account-management.fullname" . }}

spec:

  ingressClassName: {{ .Values.ingress.className }}

  rules:

    - host: {{ .Values.ingress.host }}

      http:

        paths:

          - path: /

            pathType: Prefix

            backend:

              service:
                name: {{ include "mini-account-management.fullname" . }}

                port:
                  number: {{ .Values.service.port }}

{{- end }}