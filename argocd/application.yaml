apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mini-account-management
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/hareeshn903/atoz-gitops.git
    targetRevision: HEAD
    path: helm/mini-account-management

    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true